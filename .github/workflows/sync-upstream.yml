name: Sync Upstream

on:
  schedule:
    # 每周一早上 8 点检查
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  sync:
    name: Sync with Upstream
    runs-on: ubuntu-latest
    if: github.repository == 'xfengyin/ai-trend-publish'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Check if fork
      id: check
      run: |
        # 获取仓库信息
        repo_info=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}")
        
        is_fork=$(echo "$repo_info" | jq -r '.fork')
        
        if [ "$is_fork" != "true" ]; then
          echo "This is not a fork, skipping sync"
          echo "is_fork=false" >> $GITHUB_OUTPUT
        else
          echo "This is a fork, proceeding with sync"
          echo "is_fork=true" >> $GITHUB_OUTPUT
          
          # 获取上游仓库
          parent_full_name=$(echo "$repo_info" | jq -r '.parent.full_name')
          echo "parent=$parent_full_name" >> $GITHUB_OUTPUT
        fi
        
    - name: Configure git
      if: steps.check.outputs.is_fork == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
    - name: Add upstream remote
      if: steps.check.outputs.is_fork == 'true'
      run: |
        git remote add upstream "https://github.com/${{ steps.check.outputs.parent }}.git" || true
        git fetch upstream
        
    - name: Merge upstream changes
      if: steps.check.outputs.is_fork == 'true'
      run: |
        git checkout main
        git merge upstream/main --no-edit || {
          echo "Merge conflict detected, creating PR instead"
          exit 1
        }
        
    - name: Push changes
      if: steps.check.outputs.is_fork == 'true'
      run: |
        git push origin main
        echo "Successfully synced with upstream"
